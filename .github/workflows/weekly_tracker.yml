name: Weekly Company Signal Tracker

on:
  schedule:
    - cron: '0 8 * * 1'   # Every Monday at 8:00 AM UTC
  workflow_dispatch:        # Allow manual trigger from GitHub UI

jobs:
  run-tracker:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Write config.yaml from secret
        run: |
          cat > config.yaml << 'CONFIGEOF'
          ${{ secrets.CONFIG_YAML }}
          CONFIGEOF

      - name: Write Google service account JSON
        run: echo '${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}' > service_account.json

      - name: Run tracker
        run: python main.py

      - name: Upload dashboard report
        uses: actions/upload-artifact@v4
        with:
          name: dashboard-report
          path: reports/latest.html
          retention-days: 30
