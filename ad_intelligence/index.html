/* ── Input area ────────────────────────────────────────────────────────── */

<script>
(function () {
  var _hist = [], _busy = false, _fresh = true;

  /* ── Toggle ── */
  window.ppcOpen = function () {
    var btn    = document.getElementById('ppc-btn');
    var border = document.getElementById('ppc-border');
    var isOpen = border.classList.contains('open');
    btn.classList.toggle('open', !isOpen);
    border.classList.toggle('open', !isOpen);
    if (!isOpen) {
      if (_fresh) { _fresh = false; _welcome(); }
      setTimeout(function () { document.getElementById('ppc-input').focus(); }, 380);
    }
  };

  /* ── Welcome screen ── */
  function _welcome() {
    var msgs = document.getElementById('ppc-msgs');
    var el = document.createElement('div');
    el.id = 'ppc-welcome';
    el.innerHTML =
      '<div class="ppc-wlc-orb">⚡</div>' +
      '<div class="ppc-wlc-title">What do you want to know?</div>' +
      '<div class="ppc-wlc-sub">Ask me anything — visitors, competitor ads,<br>buying signals, and more.</div>' +
      '<div class="ppc-grid">' +
        _chip('👥', 'Who visited us this week?') +
        _chip('💰', 'Recent funding rounds?') +
        _chip('🎯', "Inspire Aesthetics' active ads?") +
        _chip('👔', 'Show VP+ level visitors') +
      '</div>';
    msgs.appendChild(el);
  }

  function _chip(emoji, q) {
    return '<div class="ppc-chip" data-q="' + q.replace(/"/g, '&quot;') + '" onclick="ppcSugg(this)">' +
      '<span class="ppc-chip-ico">' + emoji + '</span>' + q + '</div>';
  }

  window.ppcSugg = function (el) {
    var q = el.getAttribute('data-q');
    document.getElementById('ppc-input').value = q;
    ppcSend();
  };

  /* ── Send ── */
  window.ppcSend = function () {
    if (_busy) return;
    var inp = document.getElementById('ppc-input');
    var msg = (inp.value || '').trim();
    if (!msg) return;

    var wlc = document.getElementById('ppc-welcome');
    if (wlc) wlc.remove();

    inp.value = ''; inp.style.height = 'auto';

    _addMsg('user', msg);
    _hist.push({ role: 'user', content: msg });

    var loader = _addLoader();
    _setBusy(true);

    fetch('/api/ppc-chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: msg, history: _hist.slice(-8) }),
    })
    .then(function (r) { return r.json(); })
    .then(function (d) {
      loader.remove();
      var ans = d.answer || 'No response.';
      _addMsg('assistant', ans);
      _hist.push({ role: 'assistant', content: ans });
    })
    .catch(function () {
      loader.remove();
      _addMsg('assistant', '⚠️ Connection error. Please try again.');
    })
    .finally(function () {
      _setBusy(false);
      document.getElementById('ppc-input').focus();
    });
  };

  function _setBusy(state) {
    _busy = state;
    var btn = document.getElementById('ppc-send');
    btn.disabled = state;
    btn.innerHTML = state
      ? '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" style="animation:ppc-spin .8s linear infinite"><circle cx="12" cy="12" r="9" stroke="rgba(255,255,255,.25)" stroke-width="2.5"/><path d="M12 3a9 9 0 0 1 9 9" stroke="#fff" stroke-width="2.5" stroke-linecap="round"/></svg>'
      : '<svg width="16" height="16" fill="none" viewBox="0 0 24 24"><path stroke="#fff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" d="M22 2 11 13M22 2l-7 20-4-9-9-4 20-7z"/></svg>';
  }

  /* ── Message helpers ── */
  function _addMsg(role, text) {
    var msgs = document.getElementById('ppc-msgs');
    var row  = document.createElement('div');
    row.className = 'ppc-row ' + role;

    var av = document.createElement('div');
    av.className = 'ppc-row-av';
    av.textContent = role === 'assistant' ? '⚡' : 'You';

    var bwrap = document.createElement('div');
    bwrap.className = 'ppc-bwrap';

    var bubble = document.createElement('div');
    bubble.className = 'ppc-bubble';
    bubble.innerHTML = _fmt(text);

    var ts = document.createElement('div');
    ts.className = 'ppc-ts';
    ts.textContent = _now();

    bwrap.appendChild(bubble);
    bwrap.appendChild(ts);
    row.appendChild(av);
    row.appendChild(bwrap);
    msgs.appendChild(row);
    msgs.scrollTop = msgs.scrollHeight;
    return row;
  }

  function _addLoader() {
    var msgs = document.getElementById('ppc-msgs');
    var row  = document.createElement('div');
    row.className = 'ppc-row assistant';

    var av = document.createElement('div');
    av.className = 'ppc-row-av';
    av.textContent = '⚡';

    var bwrap = document.createElement('div');
    bwrap.className = 'ppc-bwrap';

    var bubble = document.createElement('div');
    bubble.className = 'ppc-bubble ppc-typing';
    bubble.innerHTML =
      '<div class="ppc-wave"><span></span><span></span><span></span><span></span><span></span></div>' +
      '<span class="ppc-typing-lbl">Analyzing data…</span>';

    bwrap.appendChild(bubble);
    row.appendChild(av);
    row.appendChild(bwrap);
    msgs.appendChild(row);
    msgs.scrollTop = msgs.scrollHeight;
    return row;
  }

  /* ── Formatting ── */
  function _fmt(t) {
    t = t.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
    var lines = t.split('\n'), out = [], list = false;
    for (var i = 0; i < lines.length; i++) {
      var l = lines[i], isBullet = /^[\-\*•]\s+/.test(l.trim());
      if (isBullet) {
        if (!list) { out.push('<ul>'); list = true; }
        out.push('<li>' + l.trim().replace(/^[\-\*•]\s+/, '') + '</li>');
      } else {
        if (list) { out.push('</ul>'); list = false; }
        if (l.trim()) out.push('<p>' + l + '</p>');
      }
    }
    if (list) out.push('</ul>');
    return out.join('');
  }

  function _now() {
    var d = new Date(), h = d.getHours(), m = d.getMinutes();
    var ap = h >= 12 ? 'pm' : 'am';
    h = h % 12 || 12;
    return h + ':' + (m < 10 ? '0' + m : m) + ' ' + ap;
  }

  /* ── Spinner keyframe (injected once) ── */
  (function () {
    var s = document.createElement('style');
    s.textContent = '@keyframes ppc-spin { to { transform: rotate(360deg); } }';
    document.head.appendChild(s);
  })();

  /* ── Events ── */
  document.getElementById('ppc-input').addEventListener('keydown', function (e) {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); ppcSend(); }
  });
  document.getElementById('ppc-input').addEventListener('input', function () {
    this.style.height = 'auto';
    this.style.height = Math.min(this.scrollHeight, 96) + 'px';
  });
  document.getElementById('ppc-send').addEventListener('click', ppcSend);
  document.addEventListener('click', function (e) {
    var b = document.getElementById('ppc-border'), w = document.getElementById('ppc-wrap');
    if (b && b.classList.contains('open') && !b.contains(e.target) && !w.contains(e.target)) ppcOpen();
  });
  document.addEventListener('keydown', function (e) {
    if (e.key === 'Escape') { var b = document.getElementById('ppc-border'); if (b && b.classList.contains('open')) ppcOpen(); }
  });
})();
</script>
